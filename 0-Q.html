	<script type="text/javascript">
        // document.getElementById("txt_1").value = getSavedValue("txt_1");    // set the value to this input
        // document.getElementById("txt_2").value = getSavedValue("txt_2");   // set the value to this input
        /* Here you can add more inputs to set value. if it's saved */

        window.onload = function () {
        	randomQuestion();
        	localStorage.setItem('active_tab', 'tab_0');

        	var correct = localStorage.getItem("correct");
        	var total = localStorage.getItem("total");

		  	document.getElementById("score_correct").innerHTML = correct.toString();
		  	document.getElementById("score_total").innerHTML = total.toString();
        	var perc = Math.floor(100*correct/total);
		  	document.getElementById("score_perc").innerHTML = perc.toString();
        };

        function changeTab(tab){
        	console.log(localStorage.getItem('active_tab'));
        	var active_tab = localStorage.getItem('active_tab');
			document.getElementById(active_tab).classList.remove('active');
        	document.getElementById(active_tab).classList.add('inactive');

        	var active_tab = tab;
			document.getElementById(active_tab).classList.remove('inactive');
        	document.getElementById(active_tab).classList.add('active');
        	localStorage.setItem('active_tab', tab);
        	randomQuestion();
        }

        function checkAnswer(){
        	var q1 = parseFloat(document.getElementById("q_1").textContent);
        	var q2 = parseFloat(document.getElementById("q_2").textContent);
        	var op = document.getElementById("q_op").textContent.toString();
        	var a = parseFloat(document.getElementById("answer").value);
			var correct = parseFloat(document.getElementById("score_correct").textContent);
			var total = parseFloat(document.getElementById("score_total").textContent);

        	if (op == "  +  ") {
        		var q3 = q1 + q2;
        		if (q3 == a) {
        			document.getElementById("response").innerHTML = '<span style="color: green; font-size: 3.1rem">&#10004;</span> &nbsp; ' + q3;
        			correct = correct + 1;
        		}
        		else {
        			document.getElementById("response").innerHTML = '<span style="color: red; font-size: 2.9rem">&#10008;</span> &nbsp; ' + q3;
        		}

        	}
        	else if (op == "  -  ") {
        		var q3 = q1 - q2;
        		if (q3 == a) {
        			document.getElementById("response").innerHTML = '<span style="color: green; font-size: 3.1rem">&#10004;</span> &nbsp; ' + q3;
        			correct = correct + 1;
        		}
        		else {
        			document.getElementById("response").innerHTML = '<span style="color: red; font-size: 2.9rem">&#10008;</span> &nbsp; ' + q3;
        		}

        	}
        	else if (op == "  ×  ") {
        		var q3 = q1 * q2;
        		console.log(q3);
        		if (q3 == a) {
        			document.getElementById("response").innerHTML = '<span style="color: green; font-size: 3.1rem">&#10004;</span> &nbsp; ' + q3;
        			correct = correct + 1;
        		}
        		else {
        			document.getElementById("response").innerHTML = '<span style="color: red; font-size: 2.9rem">&#10008;</span> &nbsp; ' + q3;
        		}
        		
        	}
        	else if (op == "  /  ") {
        		var q3 = q1 / q2;
        		if (q3 == a) {
        			document.getElementById("response").innerHTML = '<span style="color: green; font-size: 3.1rem">&#10004;</span> &nbsp; ' + q3;
        			correct = correct + 1;
        		}
        		else {
        			document.getElementById("response").innerHTML = '<span style="color: red; font-size: 2.9rem">&#10008;</span> &nbsp; ' + q3;
        		}

        	}
        	else {
        		if (op.split("/").length - 1 > 0) {
        			var exp = 1/parseFloat(op.slice(-1));
        			var q3 = Math.pow(q1, exp);
        		}
        		else {  
        			var exp = parseFloat(op.slice(-1));     			
        			var q3 = Math.pow(q1, exp);
        		}
        		if (q3 == a) {
        			document.getElementById("response").innerHTML = '<span style="color: green; font-size: 3.1rem">&#10004;</span> &nbsp; ' + q3;
        			correct = correct + 1;
        		}
        		else {
        			document.getElementById("response").innerHTML = '<span style="color: red; font-size: 2.9rem">&#10008;</span> &nbsp; ' + q3;
        		}
        	}

        	total = total + 1;
		  	document.getElementById("score_correct").innerHTML = correct.toString();
		  	document.getElementById("score_total").innerHTML = total.toString();
        	var perc = Math.floor(100*correct/total);
		  	document.getElementById("score_perc").innerHTML = perc.toString();

		  	localStorage.setItem("correct", correct);
		  	localStorage.setItem("total", total);
        }

        function randomQuestion() {
        	document.getElementById("answer").value = '';
        	document.getElementById("response").innerHTML ='';

        	var active_tab = localStorage.getItem('active_tab');

        	if (active_tab == 'tab_0'){
        		operator_int = Math.floor(Math.random() * 6);
        	}
        	else if (active_tab == 'tab_1') {
        		operator_int = Math.floor(Math.random() * 2);
        	}
        	else if (active_tab == 'tab_2') {
        		operator_int = 2;
        	}
        	else if (active_tab == 'tab_3') {
        		operator_int = 3;
        	}
        	else if (active_tab == 'tab_4') {
        		operator_int = 4;
        	}
        	else if (active_tab == 'tab_5') {
        		operator_int = 5;
        	}

        	if (operator_int == 0){
		  		document.getElementById("q_op").innerHTML = " &nbsp;+&nbsp; ";
		  		var q1 = Math.floor(Math.random() * 300);
		  		var q2 = Math.floor(Math.random() * 300);
		  		document.getElementById("q_1").innerHTML = q1.toString();
		  		document.getElementById("q_2").innerHTML = q2.toString();
        	}
			else if (operator_int == 1){
		  		document.getElementById("q_op").innerHTML = " &nbsp;-&nbsp; ";
		  		var q1 = Math.floor(Math.random() * 300);
		  		var q2 = Math.floor(Math.random() * 300);
		  		document.getElementById("q_1").innerHTML = q1.toString();
		  		document.getElementById("q_2").innerHTML = q2.toString();
        	}
			else if (operator_int == 2){
		  		document.getElementById("q_op").innerHTML = " &nbsp;&#215;&nbsp; ";
		  		var q1 = Math.floor(Math.random() * 13);
		  		var q2 = Math.floor(Math.random() * 13);
		  		document.getElementById("q_1").innerHTML = q1.toString();
		  		document.getElementById("q_2").innerHTML = q2.toString();
        	}
        	else if (operator_int == 3){
		  		document.getElementById("q_op").innerHTML = " &nbsp;<i>/</i>&nbsp; ";
		  		var n = Math.floor(Math.random() * 2);
		  		if (n == 0) {
		  			var q1 = Math.floor(Math.random() * 12) + 1;
		  			var q2 = Math.floor(Math.random() * 12) + 1;
		  			q1 = q1*q2;
			  		document.getElementById("q_1").innerHTML = q1.toString();
			  		document.getElementById("q_2").innerHTML = q2.toString();
		  		}
		  		else if (n == 1) {
			  		var q1 = Math.floor(Math.random() * 145);
			  		var q2 = Math.floor(Math.random() * 4);
			  		if (q2 == 0){
			  			q2 = 2;
			  		}
			  		else if (q2 == 1){
			  			q2 = 4;
			  		}
			  		else if (q2 == 2){
			  			q2 = 5;
			  		}
			  		else if (q2 == 3){
			  			q2 = 10;
			  		}
			  		document.getElementById("q_1").innerHTML = q1.toString();
			  		document.getElementById("q_2").innerHTML = q2.toString();
		  		}
        	}
        	else if (operator_int == 4){
		  		document.getElementById("q_2").innerHTML = "";
		  		var n = Math.floor(Math.random() * 4);
		  		if (n == 0) {
			  		var q1 = Math.floor(Math.random() * 13);
			  		var q2 = Math.floor(Math.random() * 2);
			  	}
		  		else if (n == 1) {
			  		var q1 = Math.floor(Math.random() * 13);
			  		var q2 = 2;
			  	}
		  		else if (n == 2) {
			  		var q1 = Math.floor(Math.random() * 6);
			  		var q2 = 3;
			  	}
		  		else if (n == 3) {
			  		var q1 = Math.floor(Math.random() * 3) + 1;
			  		var q2 = Math.floor(Math.random() * 2) + 4;
			  	}
		  		document.getElementById("q_1").innerHTML = q1.toString();
		  		document.getElementById("q_op").innerHTML = ' <sup>' + q2.toString() + '</sup>';
        	}
        	else if (operator_int == 5){
		  		document.getElementById("q_2").innerHTML = "";
		  		document.getElementById("q_2").innerHTML = "";
		  		var n = Math.floor(Math.random() * 4);
		  		if (n == 0) {
			  		var a = Math.floor(Math.random() * 13);
			  		var b = Math.floor(Math.random() * 2);
			  	}
		  		else if (n == 1) {
			  		var a = Math.floor(Math.random() * 13);
			  		var b = 2;
			  	}
		  		else if (n == 2) {
			  		var a = Math.floor(Math.random() * 6);
			  		var b = 3;
			  	}
		  		else if (n == 3) {
			  		var a = Math.floor(Math.random() * 3) + 1;
			  		var b = Math.floor(Math.random() * 2) + 4;
			  	}
			  	var q1 = Math.pow(a, b);
			  	var q2 = b;

		  		document.getElementById("q_1").innerHTML = q1.toString();
		  		document.getElementById("q_op").innerHTML = ' <sup>1 <i>/</i> ' + q2.toString() + '</sup>';
        	}
		}
	</script>
