        window.onload = function () {

        function changeTab(tab){
        	var active_tab = localStorage.getItem('active_tab');
			document.getElementById(active_tab).classList.remove('active');
        	document.getElementById(active_tab).classList.add('inactive');

        	var active_tab = tab;
			document.getElementById(active_tab).classList.remove('inactive');
        	document.getElementById(active_tab).classList.add('active');
        	localStorage.setItem('active_tab', tab);
        	localStorage.setItem('answered', 'False');
        	randomQuestion();
        };

        function checkAnswer(){
        	var q1 = eval(document.getElementById("q_1").textContent);
        	var q2 = eval(document.getElementById("q_2").textContent);
        	var q1_str = document.getElementById("q_1").textContent;
        	var q2_str = document.getElementById("q_2").textContent;

        	var op = document.getElementById("q_op").textContent.toString();
        	var a = eval(document.getElementById("answer").value);
			var correct = parseFloat(document.getElementById("score_correct").textContent);
			var total = parseFloat(document.getElementById("score_total").textContent);
			var correct0 = correct;

        	if (op == "  +  ") {
        		var q3 = q1 + q2;
			  	if ( q3 % 0.0000001 == 0 ) { q3 = q3; }
			  	else if ( Math.abs(q3) < 1 ) { q3 = parseFloat(q3).toFixed(8); }
			  	else { q3 = parseFloat(q3).toPrecision(8); };
        		if (q3 % 1 < 0.0001 || q3 % 1 > 0.999) {
        			q3 = Math.round(q3);
        		};
        		if (q3 == a) {
        			document.getElementById("response").innerHTML = '<span style="color: green; font-size: 2.1em">&#10004;</span> &nbsp; ' + q3;
        			correct = correct + 1;
        		}
        		else {
        			document.getElementById("response").innerHTML = '<span style="color: red; font-size: 1.75em">&#10008;</span> &nbsp; ' + q3;
        		}

        	}
        	else if (op == "  -  ") {
        		var q3 = q1 - q2;
			  	if ( q3 % 0.0000001 == 0 ) { q3 = q3; }
			  	else if ( Math.abs(q3) < 1 ) { q3 = parseFloat(q3).toFixed(8); }
			  	else { q3 = parseFloat(q3).toPrecision(8); };
        		if (q3 % 1 < 0.0001 || q3 % 1 > 0.999) {
        			q3 = Math.round(q3);
        		};
        		if (q3 == a) {
        			document.getElementById("response").innerHTML = '<span style="color: green; font-size: 2.1em">&#10004;</span> &nbsp; ' + q3;
        			correct = correct + 1;
        		}
        		else {
        			document.getElementById("response").innerHTML = '<span style="color: red; font-size: 1.75em">&#10008;</span> &nbsp; ' + q3;
        		}

        	}

        		}

        			document.getElementById("response").innerHTML = '<span style="color: red; font-size: 1.75em">&#10008;</span> &nbsp; ' + q3;
        		}
        		
        	}
        	else if (op == "  /  ") {
        		var q3 = q1 / q2;
			  	if ( q3 % 0.0000001 == 0 ) { q3 = q3; }
			  	else if ( Math.abs(q3) < 1 ) { q3 = parseFloat(q3).toFixed(8); }
			  	else { q3 = parseFloat(q3).toPrecision(8); };
        		if (q3 % 1 < 0.0001 || q3 % 1 > 0.999) {
        			q3 = Math.round(q3);
        		};
        		if (q3 == a) {
        			document.getElementById("response").innerHTML = '<span style="color: green; font-size: 2.1em">&#10004;</span> &nbsp; ' + q3;
        			correct = correct + 1;
        		}
        		else {
        			document.getElementById("response").innerHTML = '<span style="color: red; font-size: 1.75em">&#10008;</span> &nbsp; ' + q3;
        		}

        	}
        	else if (q1_str.split('x2').length - 1 > 0) {
        		if (op.substring(0, 1) == 'x') {
        			var b = 1;
        		}
        		else {
        			var b = parseFloat(op.substring(0, op.search('x')));
        		}
        		var c = q2;
        		if (q1_str.split('-').length - 1 > 0) {
        			b = -1*b
        		};
        		if (op.split('-').length - 1 > 0) {
        			c = -1*c
        		};

        		var y = a*a + b*a + c;
        		var r1 = (-b + Math.sqrt(b*b - 4*c))/(2);
        		var r2 = (-b - Math.sqrt(b*b - 4*c))/(2);
			  	if ( r1 % 0.0000001 == 0 ) { r1 = r1; }
			  	else if ( Math.abs(q3) < 1 ) { r1 = parseFloat(r1).toFixed(8); }

        		r1 = r1.toString();

        			var q3 = Math.pow(q1, exp);
        		}
        		else {  
        			var exp = parseFloat(op.slice(-1));     			
        			var q3 = Math.pow(q1, exp);
        		}
        		if (q3 % 1 < 0.0001 || q3 % 1 > 0.999) {
        			q3 = Math.round(q3);
        		};

			  	else { q3 = parseFloat(q3).toPrecision(8); };
        		if (q3 == a) {
        			document.getElementById("response").innerHTML = '<span style="color: green; font-size: 2.1em">&#10004;</span> &nbsp; ' + q3;
        			correct = correct + 1;
        		}
        		else {
        			document.getElementById("response").innerHTML = '<span style="color: red; font-size: 1.75em">&#10008;</span> &nbsp; ' + q3;
        		}
        	}

        	var answered = localStorage.getItem('answered');

        	if (answered == 'False') {
	        	total = total + 1;
			  	document.getElementById("score_correct").innerHTML = correct.toString();
			  	document.getElementById("score_total").innerHTML = total.toString();
	        	var perc = Math.floor(100*correct/total);
			  	document.getElementById("score_perc").innerHTML = perc.toString();

			  	localStorage.setItem("correct", correct);
			  	localStorage.setItem("total", total);
			};

		  	if (correct > correct0) {
        		localStorage.setItem('answered', 'True');
        	};
        }
