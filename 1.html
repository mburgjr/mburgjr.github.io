<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Hue.EDU</title>
	<style>
		body {
		  margin: 0;
		  font-family: Arial;
		  text-decoration: none;
		}

		.header {
			background-color: #000A55;
			text-align: left;
			color: white;
			padding-left: 6px;
			padding-top: 6px;
			padding-bottom: 6px;
		}
		
		.header a {
		  	text-decoration: none;
			font-size: 30px;
			color: white;
		}

		.wordart {
			text-align: left;
		  	font-family: Arial, sans-serif;
		  	font-size: 2.5em;
		  	font-weight: bold;
		  	position: relative;
		  	z-index: 1;
		  	display: inline-block;
		 	-webkit-font-smoothing: antialiased;
		  	-moz-osx-font-smoothing: grayscale;
		}

		.wordart.italic-outline {
		    transform: scale(1, 1.3);
		    -webkit-transform: scale(1, 1.3);
		    -moz-transform: scale(1, 1.3);
		    -o-transform: scale(1, 1.3);
		    -ms-transform: scale(1, 1.3);
		}

		.wordart.italic-outline .text {
		    letter-spacing: -0.01em;
		    font-family: Arial, sans-serif;
		    font-weight: bold;
		    font-style: italic;
		    color: #fff;
		    -webkit-text-stroke: 0.01em #000;
		    filter: progid:DXImageTransform.Microsoft.Glow(Color=#000000, Strength=1);
		    text-shadow: 0.03em 0.03em 0 #6D6D6D;
		}

		.main-nav {
		  overflow: hidden;
		  background-color: #202020;
		}

		.main-nav a {
		  float: left;
		  color: white;
		  text-align: center;
		  padding: 14px 16px;
		  text-decoration: none;
		  font-size: 17px;
		}

		.main-nav a:hover {
		  background-color: #FFFFFF;
		  color: black;
		}

		.main-nav a.active {
		  background-color: #6A7BFF;
		  color: white;
		}
	</style>

</head>
<body>
	<header class='header'>
		<div class="wordart italic-outline">
			<span class="text">HUE.EDU</span>
		</div>
	</header>
	<div class="main-nav">

</body>
