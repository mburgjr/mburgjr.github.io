	<script type="text/javascript">
		
        window.onload = function () {
        	standard_onload();

        	var correct = localStorage.getItem("correct1");
        	var total = localStorage.getItem("total1");

		  	document.getElementById("score_correct").innerHTML = correct.toString();
		  	document.getElementById("score_total").innerHTML = total.toString();
        	var perc = Math.floor(100*correct/total);
		  	document.getElementById("score_perc").innerHTML = perc.toString();

  			var canvas = document.getElementById('canvas');
    		var ctx = canvas.getContext('2d');
    		canvas.width = 2*window.innerWidth;
    		canvas.height = 2*window.innerHeight;
			canvas.setAttribute('height', 1.2*canvas.height);
			ctx.fillStyle = "#FFFFFF";
		  	ctx.fillRect(0, 0, canvas.width, canvas.height);
			localStorage.setItem('active_tab', 'tab_0');
        	localStorage.setItem('answered', 'False');
		  	randomQuestion();
		  	
		  	document.addEventListener('keyup', (e) => {
			  if (e.code === "Space" && document.getElementById('answer') !== document.activeElement){
			  	randomQuestion();
			  };
			});
        };

        function changeTab(tab){
        	var active_tab = localStorage.getItem('active_tab');
			document.getElementById(active_tab).classList.remove('active');
        	document.getElementById(active_tab).classList.add('inactive');

        	var active_tab = tab;
			document.getElementById(active_tab).classList.remove('inactive');
        	document.getElementById(active_tab).classList.add('active');
        	localStorage.setItem('active_tab', tab);
        	localStorage.setItem('answered', 'False');
        	randomQuestion();
        };

        function reduce(numerator,denominator){
		  var gcd = function gcd(a,b){
		    return b ? gcd(b, a%b) : a;
		  };
		  gcd = gcd(numerator,denominator);
		  return [numerator/gcd, denominator/gcd];
		};

        function checkAnswer(){
        	var op = localStorage.getItem('operator');
        	var a = document.getElementById("answer").value;
		  	a = read(a);
			var correct = parseFloat(document.getElementById("score_correct").textContent);
			var total = parseFloat(document.getElementById("score_total").textContent);
			var correct0 = correct;

        	if (op == 1) {
        		var shape_int = localStorage.getItem('q_type1');
        		var AP = localStorage.getItem('q_type2');

        		if (shape_int == 0) {
        			var s = localStorage.getItem('q_input1');
        			if (AP == 'A') {
        				var q3 = s*s;
					  	if ( q3 % 0.0000001 == 0 ) { q3 = q3; }
					  	else if ( Math.abs(q3) < 1 ) { q3 = parseFloat(q3).toFixed(8); }
					  	else { q3 = parseFloat(q3).toPrecision(8); };
        				if (Math.abs(a - q3)/a < 0.001) {
		        			document.getElementById("response").innerHTML = '<span style="color: green; font-size: 2.1em">&#10004;</span> &nbsp; ' + q3.toString();
		        			correct = correct + 1;
        				}
        				else {
        					document.getElementById("response").innerHTML = '<span style="color: red; font-size: 1.75em">&#10008;</span> &nbsp; ' + q3.toString();
        				};
        			}
        			else {
        				var q3 = 4*s;
					  	if ( q3 % 0.0000001 == 0 ) { q3 = q3; }
					  	else if ( Math.abs(q3) < 1 ) { q3 = parseFloat(q3).toFixed(8); }
					  	else { q3 = parseFloat(q3).toPrecision(8); };
        				if (Math.abs(a - q3)/a < 0.001) {
		        			document.getElementById("response").innerHTML = '<span style="color: green; font-size: 2.1em">&#10004;</span> &nbsp; ' + q3.toString();
		        			correct = correct + 1;
        				}
        				else {
        					document.getElementById("response").innerHTML = '<span style="color: red; font-size: 1.75em">&#10008;</span> &nbsp; ' + q3.toString();        					
        				};
        			};
        		}
        		else if (shape_int == 1) {
        			var B = localStorage.getItem('q_input1');
        			var H = localStorage.getItem('q_input2');
        			var W = localStorage.getItem('q_input3');
        			if (AP == 'A') {
        				var q3 = B*H/2;
					  	if ( q3 % 0.0000001 == 0 ) { q3 = q3; }
					  	else if ( Math.abs(q3) < 1 ) { q3 = parseFloat(q3).toFixed(8); }
					  	else { q3 = parseFloat(q3).toPrecision(8); };
        				if (Math.abs(a - q3)/a < 0.001) {
		        			document.getElementById("response").innerHTML = '<span style="color: green; font-size: 2.1em">&#10004;</span> &nbsp; ' + q3.toString();
		        			correct = correct + 1;
        				}
        				else {
        					document.getElementById("response").innerHTML = '<span style="color: red; font-size: 1.75em">&#10008;</span> &nbsp; ' + q3.toString();
        				};
        			}
        			else {
        				var q3 = B + Math.sqrt(W*W + H*H) + Math.sqrt(H*H + (B - W)*(B - W));
					  	if ( q3 % 0.0000001 == 0 ) { q3 = q3; }
					  	else if ( Math.abs(q3) < 1 ) { q3 = parseFloat(q3).toFixed(8); }
					  	else { q3 = parseFloat(q3).toPrecision(8); };
        				if (Math.abs(a - q3)/a < 0.001) {
		        			document.getElementById("response").innerHTML = '<span style="color: green; font-size: 2.1em">&#10004;</span> &nbsp; ' + q3.toString();
		        			correct = correct + 1;
        				}
        				else {
        					document.getElementById("response").innerHTML = '<span style="color: red; font-size: 1.75em">&#10008;</span> &nbsp; ' + q3.toString();        					
        				};
        			};
        		}
        		else if (shape_int == 2) {
        			var rd_int = localStorage.getItem('q_input1');        			
        			var R = localStorage.getItem('q_input2');
        			if (AP == 'A') {
        				if (rd_int == 'D') {
        					R = R/2;
        				}
        				var q3 = Math.PI*R*R;
					  	if ( q3 % 0.0000001 == 0 ) { q3 = q3; }
					  	else if ( Math.abs(q3) < 1 ) { q3 = parseFloat(q3).toFixed(8); }
					  	else { q3 = parseFloat(q3).toPrecision(8); };
        				if (Math.abs(a - q3)/a < 0.001) {
		        			document.getElementById("response").innerHTML = '<span style="color: green; font-size: 2.1em">&#10004;</span> &nbsp; ' + q3.toString();
		        			correct = correct + 1;
        				}
        				else {
        					document.getElementById("response").innerHTML = '<span style="color: red; font-size: 1.75em">&#10008;</span> &nbsp; ' + q3.toString();
        				};
        			}
        			else {
        				if (rd_int == 'D') {
        					R = R/2;
        				}
        				var q3 = 2*Math.PI*R;
					  	if ( q3 % 0.0000001 == 0 ) { q3 = q3; }
					  	else if ( Math.abs(q3) < 1 ) { q3 = parseFloat(q3).toFixed(8); }
					  	else { q3 = parseFloat(q3).toPrecision(8); };
        				if (Math.abs(a - q3)/a < 0.001) {
		        			document.getElementById("response").innerHTML = '<span style="color: green; font-size: 2.1em">&#10004;</span> &nbsp; ' + q3.toString();
		        			correct = correct + 1;
        				}
        				else {
        					document.getElementById("response").innerHTML = '<span style="color: red; font-size: 1.75em">&#10008;</span> &nbsp; ' + q3.toString();        					
        				};
        			};
        		}
        		else {
        			var L = localStorage.getItem('q_input1');
        			var W = localStorage.getItem('q_input2');
        			if (AP == 'A') {
        				var q3 = L*W;
					  	if ( q3 % 0.0000001 == 0 ) { q3 = q3; }
					  	else if ( Math.abs(q3) < 1 ) { q3 = parseFloat(q3).toFixed(8); }
					  	else { q3 = parseFloat(q3).toPrecision(8); };
        				if (Math.abs(a - q3)/a < 0.001) {
		        			document.getElementById("response").innerHTML = '<span style="color: green; font-size: 2.1em">&#10004;</span> &nbsp; ' + q3.toString();
		        			correct = correct + 1;
        				}
        				else {
        					document.getElementById("response").innerHTML = '<span style="color: red; font-size: 1.75em">&#10008;</span> &nbsp; ' + q3.toString();
        				};
        			}
        			else {
        				var q3 = 2*L + 2*W;
					  	if ( q3 % 0.0000001 == 0 ) { q3 = q3; }
					  	else if ( Math.abs(q3) < 1 ) { q3 = parseFloat(q3).toFixed(8); }
					  	else { q3 = parseFloat(q3).toPrecision(8); };
        				if (Math.abs(a - q3)/a < 0.001) {
		        			document.getElementById("response").innerHTML = '<span style="color: green; font-size: 2.1em">&#10004;</span> &nbsp; ' + q3.toString();
		        			correct = correct + 1;
        				}
        				else {
        					document.getElementById("response").innerHTML = '<span style="color: red; font-size: 1.75em">&#10008;</span> &nbsp; ' + q3.toString();        					
        				};
        			};
        		};
        	}
        	else if (op == 2) {
				var RD = localStorage.getItem('q_type1');
				var v = localStorage.getItem('q_input1');

				if (RD == 'R') {
					var q3 = 180*v/Math.PI;
				  	if ( q3 % 0.0000001 == 0 ) { q3 = q3; }
				  	else if ( Math.abs(q3) < 1 ) { q3 = parseFloat(q3).toFixed(8); }
				  	else { q3 = parseFloat(q3).toPrecision(8); };
    				if (Math.abs(a - q3)/a < 0.001) {
	        			document.getElementById("response").innerHTML = '<span style="color: green; font-size: 2.1em">&#10004;</span> &nbsp; ' + q3.toString() + '&deg;';
	        			correct = correct + 1;
    				}
    				else {
    					document.getElementById("response").innerHTML = '<span style="color: red; font-size: 1.75em">&#10008;</span> &nbsp; ' + q3.toString() + '&deg;';        					
    				};
				}
				else {
					var q3 = Math.PI*v/180;
				  	if ( q3 % 0.0000001 == 0 ) { q3 = q3; }
				  	else if ( Math.abs(q3) < 1 ) { q3 = parseFloat(q3).toFixed(8); }
				  	else { q3 = parseFloat(q3).toPrecision(8); };
    				if (Math.abs(a - q3)/a < 0.001) {
	        			document.getElementById("response").innerHTML = '<span style="color: green; font-size: 2.1em">&#10004;</span> &nbsp; ' + q3.toString();
	        			correct = correct + 1;
    				}
    				else {
    					document.getElementById("response").innerHTML = '<span style="color: red; font-size: 1.75em">&#10008;</span> &nbsp; ' + q3.toString();        					
    				};
				};
        	}
        	else if (op == 3) {
	    		var A = localStorage.getItem('q_input1');
	    		var B = localStorage.getItem('q_input2');
